<h2>Audit log</h2>
<a href="/dashboard">Nazad</a>

<table border="1">
<tr>
<th>Vrijeme</th>
<th>Korisnik</th>
<th>Član</th>
<th>Mjesec</th>
<th>Promjena</th>
</tr>

{% for log in logs %}
<tr>
<td>{{ log.timestamp }}</td>
<td>{{ log.user }}</td>
<td>{{ log.member }}</td>
<td>{{ log.month }}</td>
<td>{{ log.old_value }} → {{ log.new_value }}</td>
</tr>
{% endfor %}
</table>
